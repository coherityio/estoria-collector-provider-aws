name: Build and Publish Estoria Collector Provider AWS

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  
jobs:
  build-and-test:
    name: Build and Test Application
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Remove cached estoria-collector-spi snapshot
      run: rm -rf ~/.m2/repository/io/coherity/estoria/estoria-collector-spi
        
    - name: Make Maven wrapper executable
      run: chmod +x ./mvnw
        
    - name: Run tests
      run: ./mvnw -U -s .github/workflows/ci-settings.xml test
      env:
        MAVEN_USERNAME: ${{ github.actor }}
        MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      
    - name: Build application
      run: ./mvnw -U -s .github/workflows/ci-settings.xml clean package -DskipTests
      env:
        MAVEN_USERNAME: ${{ github.actor }}
        MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: jar-artifacts
        path: |
          target/*.jar

  publish-packages:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Remove cached estoria-collector-spi snapshot
      run: rm -rf ~/.m2/repository/io/coherity/estoria/estoria-collector-spi
        
    - name: Make Maven wrapper executable
      run: chmod +x ./mvnw
        
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: jar-artifacts
        path: target/
        
    - name: Publish JAR to GitHub Packages
      run: ./mvnw -U -s .github/workflows/ci-settings.xml deploy -DskipTests
      env:
        MAVEN_USERNAME: ${{ github.actor }}
        MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [build-and-test, publish-packages]
    if: always()
    
    steps:
    - name: Notify success
      if: needs.build-and-test.result == 'success' && (needs.publish-packages.result == 'success' || needs.publish-packages.result == 'skipped') 
      run: |
        echo "✅ Estoria Collector Provider AWS build and publish completed successfully!"
        echo "Branch/Tag: ${{ github.ref }}"
        echo "Commit: ${{ github.sha }}"
        
    - name: Notify failure
      if: needs.build-and-test.result == 'failure'
      run: |
        echo "❌ Estoria Collector Provider AWS build or publish failed!"
        echo "Branch/Tag: ${{ github.ref }}"
        echo "Commit: ${{ github.sha }}"
        exit 1